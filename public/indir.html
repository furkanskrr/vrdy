<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1419" />
    <title>Vardiyam? — Android İndir</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f1419;
        color: #e8edf4;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: #171d26;
        border: 1px solid #2a3444;
        border-radius: 20px;
        padding: 28px;
        text-align: center;
      }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      p { color: #9aa8bc; line-height: 1.5; margin: 0 0 20px; font-size: 0.95rem; }
      a.btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #3d8bfd;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        padding: 14px 22px;
        border-radius: 14px;
        width: 100%;
      }
      .note { margin-top: 16px; font-size: 0.82rem; color: #7d8aa0; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Vardiyam?</h1>
      <p>Android için uygulamayı indirin. Dosya adı <strong>Vardiyam.apk</strong> olarak kaydedilir.</p>
      <a class="btn" href="/Vardiyam.apk" download="Vardiyam.apk">Vardiyam.apk indir</a>
      <p class="note">İndirme bitince dosyayı açıp kurun. Eski sürüm varsa silmenize gerek yok.</p>
    </div>
  </body>
</html>
