<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, shrink-to-fit=no, interactive-widget=resizes-content" />
    <title>%WEB_TITLE%</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
        min-height: 100%;
        min-height: 100dvh;
        margin: 0;
        padding: 0;
        background-color: #0f1419;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        min-height: 100%;
        min-height: 100dvh;
        flex: 1;
        background-color: #0f1419;
      }
      /* iOS Safari: 16px altında otomatik zoom; varsayılan mavi outline kaldır */
      #root input,
      #root textarea {
        font-size: 16px !important;
        outline: none !important;
        -webkit-appearance: none;
        appearance: none;
      }
      #root input:focus,
      #root textarea:focus {
        outline: none !important;
      }
    </style>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Vardiyam" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="application-name" content="Vardiyam" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0f1419" />
    <meta name="msapplication-TileColor" content="#0f1419" />
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
